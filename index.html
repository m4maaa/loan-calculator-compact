<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Loan Calculator Compact</title>
<style>
body {
  font-family: sans-serif;
  background: #f5f5f5;
}
.container {
  width: 360px;
  margin: auto;
}
.box {
  border: 1px solid #333;
  margin: 10px 0;
  padding: 10px;
  background: #fff;
}
.title {
  font-weight: bold;
  text-align: center;
  margin-bottom: 8px;
}
.row {
  display: flex;
  gap: 5px;
  margin-bottom: 5px;
}
input {
  flex: 1;
  padding: 5px;
}
.result {
  display: flex;
  justify-content: space-between;
  padding: 5px;
  border: 1px solid #ccc;
  margin-top: 5px;
}
.pass {
  background: #8fda94;
}
.fail {
  background: #f3b4a6;
}
button {
  width: 48%;
  padding: 8px;
  margin-top: 10px;
}
</style>
</head>

<body>
<div class="container">

  <!-- ส่วนที่ 1 -->
  <div class="box">
    <div class="title">ข้อมูลรายได้</div>
    <div class="row">
      <input type="number" id="income" placeholder="รวมรับ">
      <input type="number" id="deduct" placeholder="รวมหัก">
    </div>
    <div class="result">1/3: <span id="oneThird">0</span></div>
    <div class="result">เหลือรับ: <span id="remain">0</span></div>
  </div>

  <!-- ส่วนที่ 2 -->
  <div class="box">
    <div class="title">หนี้</div>
    <div class="row">
      <input type="number" id="newDebt" placeholder="หนี้ใหม่/เดือน">
      <input type="number" id="oldDebt" placeholder="หนี้เดิม/เดือน">
    </div>
  </div>

  <!-- ส่วนที่ 3 -->
  <div class="box">
    <div class="title">ผลลัพธ์</div>

    <div id="check1" class="result">
      เหลือรับ > 1/3 หลังกู้ <span>-</span>
    </div>

    <div id="check2" class="result">
      เหลือรับ > 5,000 <span>-</span>
    </div>

    <div class="result">
      เหลือรับใหม่: <span id="finalRemain">0</span>
    </div>
  </div>

  <div class="row">
    <button onclick="resetData()">รีเซ็ต</button>
    <button onclick="saveData()">บันทึก</button>
  </div>

</div>

<script>
const inputs = document.querySelectorAll("input");

inputs.forEach(i => i.addEventListener("input", calculate));

function calculate() {
  let income = +document.getElementById("income").value || 0;
  let deduct = +document.getElementById("deduct").value || 0;
  let newDebt = +document.getElementById("newDebt").value || 0;
  let oldDebt = +document.getElementById("oldDebt").value || 0;

  let oneThird = income / 3;
  let remain = income - deduct;

  let finalRemain = remain + oldDebt - newDebt;

  // แสดงผล
  document.getElementById("oneThird").innerText = oneThird.toFixed(2);
  document.getElementById("remain").innerText = remain.toFixed(2);
  document.getElementById("finalRemain").innerText = finalRemain.toFixed(2);

  // เงื่อนไข 1
  let check1 = finalRemain > oneThird;
  setResult("check1", check1);

  // เงื่อนไข 2
  let check2 = finalRemain > 5000;
  setResult("check2", check2);
}

function setResult(id, pass) {
  let el = document.getElementById(id);
  el.classList.remove("pass", "fail");
  el.classList.add(pass ? "pass" : "fail");
  el.querySelector("span").innerText = pass ? "/" : "X";
}

function resetData() {
  inputs.forEach(i => i.value = "");
  calculate();
}

function saveData() {
  let data = {};
  inputs.forEach(i => data[i.id] = i.value);
  localStorage.setItem("loanData", JSON.stringify(data));
  alert("บันทึกแล้ว");
}

// โหลดข้อมูล
window.onload = () => {
  let data = JSON.parse(localStorage.getItem("loanData") || "{}");
  inputs.forEach(i => {
    if (data[i.id]) i.value = data[i.id];
  });
  calculate();
}
</script>

</body>
</html>
