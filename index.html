<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Loan Compact</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Loan Compact">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  
<style>
* { box-sizing: border-box; }

body {
  font-family: "Kanit", sans-serif;
  background:#f5f5f5;
}

.container {
  width: 100%;
  max-width: 420px;
  margin: auto;
  padding: 10px;
}

.box {
  border-radius: 10px;
  border:1px solid #333;
  margin:10px 0;
  padding:10px;
  background:#fff;
}

.title {
  text-align:center;
  font-weight:600;
  margin-bottom:8px;
}

.row {
  display:flex;
  gap:5px;
  margin-bottom:5px;
}

input, select {
  width:100%;
  padding:10px;
  font-size:16px;
}

.row.result-row {
  display:flex;
  gap:5px;
}

.result {
  flex:1;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border:1px solid #ccc;
  padding:6px;
  font-size:14px;
}

.result span {
  font-weight:bold;
}

.pass { background:#8fda94; }
.fail { background:#f3b4a6; }

/* สีทั้งกล่อง */
.box.red {
  background: #f8caca;
  border-color: #cc0000;
}

.box.orange {
  background: #ffe0b3;
  border-color: #ff9900;
}

.box.green {
  background: #d4edda;
  border-color: #28a745;
}

button {
  width: 100%;
  padding: 10px;
  font-size: 16px;
  margin-top:10px;
}
  
.row:last-child {
  gap: 10px;
}

/* mobile */
@media (max-width: 480px){
  .container { width:95%; }
}
</style>
</head>

<body>
<div class="container">

<!-- ส่วนที่ 1 -->
<div class="box">
  <div class="title">ข้อมูลรายได้</div>

  <div class="row">
    <input type="text" id="salary" placeholder="เงินเดือน" inputmode="decimal">
    <select id="month"></select>
  </div>

  <div class="row">
    <input type="text" id="income" placeholder="รวมรับ" inputmode="decimal">
    <input type="text" id="deduct" placeholder="รวมหัก" inputmode="decimal">
  </div>

  <div class="row result-row">
    <div class="result">ยอด 1 ใน 3 คือ: <span id="oneThird">0</span></div>
    <div class="result">เหลือรับ: <span id="remain">0.00</span></div>
  </div>
</div>

<!-- ส่วนที่ 2 -->
<div class="box">
  <div class="title">หนี้</div>
  <div class="row">
    <input type="text" id="newDebt" placeholder="หนี้ใหม่/เดือน" inputmode="decimal">
    <input type="text" id="oldDebt" placeholder="หนี้เดิม/เดือน" inputmode="decimal">
  </div>
</div>

<!-- ส่วนที่ 3 -->
<div class="box" id="resultBox">
  <div class="title">ผลลัพธ์</div>

  <div id="check1" class="result">
    เหลือรับ > ยอด 1 ใน 3 <span>-</span>
  </div>

  <div id="check2" class="result">
    เหลือรับ > 5,000 บาท/เดือน <span>-</span>
  </div>

  <div class="result">
    เหลือรับหลังกู้: <span id="finalRemain">0.00</span>
  </div>
</div>

<div class="row">
  <button onclick="resetData()">รีเซ็ต</button>
  <button onclick="saveData()">บันทึก</button>
</div>

</div>

<script>
// เดือน
const months = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน",
"กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];

const monthSelect = document.getElementById("month");

months.forEach((m,i)=>{
  let opt = document.createElement("option");
  opt.value = i;
  opt.text = m;
  monthSelect.appendChild(opt);
});

// default เดือนปัจจุบัน
monthSelect.value = new Date().getMonth();

// format เงิน
function formatMoney(val){
  if(!val) return "";
  val = val.replace(/,/g,"");
  let num = parseFloat(val);
  if(isNaN(num)) return "";
  return num.toLocaleString("en-US", {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  });
}

// ดึงค่า
function getVal(id){
  let v = document.getElementById(id).value.replace(/,/g,"");
  return parseFloat(v) || 0;
}

// input event
document.querySelectorAll("input").forEach(i=>{

  i.addEventListener("input", ()=>{
    calculate();
  });

  i.addEventListener("blur", e=>{
    e.target.value = formatMoney(e.target.value);
  });

});

// คำนวณ
function calculate(){
  let income = getVal("income");
  let deduct = getVal("deduct");
  let newDebt = getVal("newDebt");
  let oldDebt = getVal("oldDebt");

  let oneThird = income / 3;
  let remain = income - deduct;
  let finalRemain = remain - newDebt + oldDebt;

  document.getElementById("oneThird").innerText =
    oneThird.toLocaleString(undefined,{minimumFractionDigits:2});

  document.getElementById("remain").innerText =
    remain.toLocaleString(undefined,{minimumFractionDigits:2});

  document.getElementById("finalRemain").innerText =
    finalRemain.toLocaleString(undefined,{minimumFractionDigits:2});

  let pass1 = finalRemain > oneThird;
  let pass2 = finalRemain > 5000;

  setResult("check1", pass1);
  setResult("check2", pass2);

  // เปลี่ยนสีทั้งกล่อง
  let box = document.getElementById("resultBox");
  box.classList.remove("red","orange","green");

  if(pass1 && pass2){
    box.classList.add("green");
  }else if(pass1 || pass2){
    box.classList.add("orange");
  }else{
    box.classList.add("red");
  }
}

// set result
function setResult(id, pass){
  let el = document.getElementById(id);
  if(!el) return;

  el.classList.remove("pass","fail");
  el.classList.add(pass ? "pass":"fail");

  let span = el.querySelector("span");
  if(span){
    span.innerText = pass ? "/" : "X";
  }
}

// reset
function resetData(){
  document.querySelectorAll("input").forEach(i=>i.value="");
  calculate();
}

// save
function saveData(){
  let data = {};
  document.querySelectorAll("input").forEach(i=>data[i.id]=i.value);
  data.month = monthSelect.value;
  localStorage.setItem("loanData", JSON.stringify(data));
  alert("บันทึกแล้ว");
}

// load
window.onload = ()=>{
  let data = JSON.parse(localStorage.getItem("loanData")||"{}");
  document.querySelectorAll("input").forEach(i=>{
    if(data[i.id]) i.value = data[i.id];
  });
  if(data.month) monthSelect.value = data.month;
  calculate();
}
</script>

</body>
</html>
